# Static site — no build step; files deploy from repo root.
[build]
  publish = "."
  command = ""

# Netlify serves 404.html automatically for missing pages.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
